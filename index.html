<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pergunta</title>

<style>
body{
    margin:0;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    font-family:sans-serif;
    color:white;
    text-align:center;
    background: url("foto.jpg") no-repeat center/cover;
    filter: brightness(1.2) contrast(1.1);
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#sim{background:#ff4d6d;}
#nao{background:#222; position:absolute;}

/* corações */
.coracao{
    position:fixed;
    top:-10px;
    font-size:20px;
    animation:cair linear infinite;
}
@keyframes cair{to{transform:translateY(110vh);}}

/* final */
#final{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:24px;
    opacity:0;
    pointer-events:none;
    transition:1s;
}

/* POESIA PRO */
#poesia{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
    opacity:0;
    transition:1s;
}

#texto{
    max-width:80%;
    font-size:20px;
    line-height:1.6;
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:12px;
    text-align:left;
}

/* player */
#player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
    display:flex;
    align-items:center;
    gap:10px;
    opacity:0;
    transition:0.5s;
}

#capa{
    width:50px;
    height:50px;
    border-radius:8px;
}

#info{flex:1;text-align:left;}
input[type=range]{width:100%;}

#pato{
    position:fixed;
    bottom:70px;
    right:10px;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<h1>Karoline, você ama o Josué? ❤️</h1>

<button id="sim" onclick="respostaSim()">Sim</button>
<button id="nao" onmouseover="fugir()" onclick="fugir()">Não</button>

<audio id="musica">
    <source src="lana.mp3" type="audio/mpeg">
</audio>

<div id="final">
    <p>KAROLINE ❤️</p>
    <p>te amo ❤️</p>
</div>

<!-- poesia -->
<div id="poesia">
    <div id="texto"></div>
</div>

<!-- player -->
<div id="player">
    <img id="capa" src="capa.jpg">
    <div id="info">
        <div>Lana</div>
        <div style="font-size:12px; opacity:0.7;">Kamaitachi</div>
        <input type="range" id="barra" value="0">
    </div>
    <button onclick="toggle()">▶</button>
</div>

<div id="pato">🦆 quak</div>

<script>
let musica = document.getElementById("musica");
let barra = document.getElementById("barra");
let tamanho = 1;
let tempoInicio = Date.now();

document.body.addEventListener("click", ()=>{
    musica.play();
}, { once:true });

function respostaSim(){
    document.getElementById("final").style.opacity = 1;
    document.getElementById("player").style.opacity = 1;
    document.getElementById("poesia").style.opacity = 1;

    iniciarPoesia();

    let tempoFinal = Date.now();
    let segundos = ((tempoFinal - tempoInicio)/1000).toFixed(1);

    let t = document.createElement("p");
    t.innerText = "vc demorou " + segundos + "s";
    document.getElementById("final").appendChild(t);

    musica.play();
}

/* poesia digitando */
const linhas = [
"eu nem tava pensando em vc...",
"era pra eu tá estudando",
"mas vc apareceu",
"",
"e é doido pensar",
"que vc me ajudou até nisso",
"até com html",
"",
"cada coisa que eu faço",
"tem um pouco de vc",
"",
"e agr eu só quero",
"te ver logo dnv",
"pq na moral",
"eu te amo pra krl ❤️"
];

function iniciarPoesia(){
    let i = 0;
    let texto = document.getElementById("texto");

    function escreverLinha(){
        if(i >= linhas.length) return;

        let p = document.createElement("p");
        texto.appendChild(p);

        let letra = 0;
        let linha = linhas[i];

        let intervalo = setInterval(()=>{
            p.innerHTML += linha[letra] || "";
            letra++;

            if(letra > linha.length){
                clearInterval(intervalo);
                i++;
                setTimeout(escreverLinha, 500);
            }
        }, 40);
    }

    escreverLinha();
}

/* player */
function toggle(){
    if(musica.paused){
        musica.play();
    }else{
        musica.pause();
    }
}

musica.addEventListener("timeupdate", ()=>{
    barra.value = (musica.currentTime / musica.duration)*100;
});

barra.addEventListener("input", ()=>{
    musica.currentTime = (barra.value/100)*musica.duration;
});

/* botão fugir */
function fugir(){
    let x = Math.random()*(window.innerWidth-100);
    let y = Math.random()*(window.innerHeight-50);

    let b = document.getElementById("nao");
    b.style.left = x+"px";
    b.style.top = y+"px";

    let sim = document.getElementById("sim");
    tamanho += 0.2;
    sim.style.transform = "scale("+tamanho+")";
}

/* corações */
function criarCoracao(){
    let c = document.createElement("div");
    c.className="coracao";
    c.innerHTML="❤️";
    c.style.left=Math.random()*100+"vw";
    c.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
}
setInterval(criarCoracao,300);
</script>

</body>
</html>
