<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
}

/* FUNDO CERTO */
body{
    font-family:sans-serif;
    color:white;
    text-align:center;
    background:url("foto.jpg") no-repeat center center;
    background-size:cover;
}

/* sombra */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* telas */
.tela{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
    box-sizing:border-box;
}

/* poesia com scroll */
#poesia{
    justify-content:flex-start;
    overflow-y:auto;
}

/* esconder */
#poesia, #final{
    display:none;
}

/* textos */
h1, h2, p{
    margin:10px 0;
}

#texto{
    max-width:600px;
    width:100%;
    font-size:22px;
    line-height:1.6;
}

/* botões */
button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin:10px;
}

#sim{background:#ff4d6d;}

#nao{
    background:#222;
    position:absolute;
}

/* botão próximo */
#btnProximo{
    display:none;
    margin-top:30px;
    font-size:20px;
    background:#ff4d6d;
}

/* tempo */
#tempo{
    font-size:22px;
}

/* PLAYER */
#player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
}

#capa{
    width:70px;
    height:70px;
    border-radius:10px;
}

#info{
    flex:1;
    text-align:left;
}

input[type=range]{
    width:100%;
}

#player button{
    font-size:24px;
}

/* corações */
.coracao{
    position:fixed;
    top:-10px;
    font-size:24px;
    animation:cair linear infinite;
}

@keyframes cair{
    to{transform:translateY(110vh);}
}

/* QUAK GRANDE */
#pato{
    position:fixed;
    bottom:120px;
    right:15px;
    font-size:22px;
}
</style>
</head>

<body>

<div id="inicio" class="tela">
    <h1>Karoline, você ama o Josué? ❤️</h1>
    <button id="sim" onclick="irPoesia()">Sim</button>
    <button id="nao" onmouseover="fugir()">Não</button>
</div>

<div id="poesia" class="tela">
    <div id="texto"></div>
    <button id="btnProximo" onclick="irFinal()">Próximo</button>
</div>

<div id="final" class="tela">
    <h2>KAROLINE ❤️</h2>
    <p>te amo ❤️</p>
    <p id="tempo"></p>
</div>

<div id="player">
    <img id="capa" src="capa.jpg">
    <div id="info">
        <div>Lana</div>
        <div style="opacity:0.7;">Kamaitachi</div>
        <input type="range" id="barra">
    </div>
    <button onclick="toggle()">▶</button>
</div>

<audio id="musica">
    <source src="lana.mp3">
</audio>

<div id="pato">🦆 quak</div>

<script>
let musica = document.getElementById("musica");
let barra = document.getElementById("barra");
let tempoInicio = Date.now();

document.body.addEventListener("click", ()=>{
    musica.play();
}, { once:true });

function irPoesia(){
    inicio.style.display="none";
    poesia.style.display="flex";
    iniciarPoesia();
}

function irFinal(){
    poesia.style.display="none";
    final.style.display="flex";

    let tempoFinal = Date.now();
    let segundos = ((tempoFinal - tempoInicio)/1000).toFixed(1);
    tempo.innerText = "vc demorou " + segundos + "s";
}

const linhas = [
"eu nem tava pensando em vc...",
"era pra eu tá estudando",
"mas vc apareceu",
"",
"vc me ajudou até nisso",
"até com html",
"",
"cada coisa que eu faço",
"tem um pouco de vc",
"",
"eu só quero te ver logo",
"",
"pq eu te amo pra krl ❤️"
];

function iniciarPoesia(){
    let i=0;

    function escrever(){
        if(i>=linhas.length){
            btnProximo.style.display="block";
            return;
        }

        let p=document.createElement("p");
        texto.appendChild(p);

        let j=0;
        let linha=linhas[i];

        let inter=setInterval(()=>{
            p.innerHTML+=linha[j]||"";
            j++;

            if(j>linha.length){
                clearInterval(inter);
                i++;
                setTimeout(escrever,400);
            }
        },40);
    }

    escrever();
}

function toggle(){
    musica.paused ? musica.play() : musica.pause();
}

musica.addEventListener("timeupdate", ()=>{
    barra.value = (musica.currentTime / musica.duration)*100;
});

barra.addEventListener("input", ()=>{
    musica.currentTime = (barra.value/100)*musica.duration;
});

function fugir(){
    let b = document.getElementById("nao");

    let largura = window.innerWidth - b.offsetWidth;
    let altura = window.innerHeight - b.offsetHeight;

    b.style.left = Math.random()*largura + "px";
    b.style.top = Math.random()*altura + "px";
}

function criarCoracao(){
    let c=document.createElement("div");
    c.className="coracao";
    c.innerHTML="❤️";
    c.style.left=Math.random()*100+"vw";
    c.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
}
setInterval(criarCoracao,300);
</script>

</body>
</html>
