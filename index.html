<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta</title>

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
}

/* FUNDO */
body{
    font-family:sans-serif;
    color:white;
    text-align:center;
    background:url("foto.jpg") no-repeat center center;
    background-size:cover;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

/* TELAS */
.tela{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

/* ESCONDER */
#labirintoTela, #poesia, #final{
    display:none;
}

/* TEXTOS RESPONSIVOS */
h1, h2{
    font-size:clamp(22px,6vw,32px);
}

#texto{
    max-width:90%;
    font-size:clamp(18px,5vw,24px);
}

/* LABIRINTO */
#labirinto{
    width:80vw;
    height:80vw;
    max-width:320px;
    max-height:320px;
    background:#111;
    position:relative;
    border:3px solid white;
}

/* PAREDES */
.parede{
    position:absolute;
    background:white;
}

/* PLAYER */
#playerHeart{
    position:absolute;
    width:28px;
    height:28px;
    font-size:22px;
}

/* FIM */
#fim{
    position:absolute;
    width:30px;
    height:30px;
    background:lime;
    right:10px;
    bottom:10px;
}

/* BOTÕES */
button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin:10px;
}

#sim{background:#ff4d6d;}
#nao{position:absolute;background:#222;}

/* PLAYER MÚSICA */
#player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
    display:flex;
    gap:10px;
    align-items:center;
    height:80px;
}

#capa{
    width:70px;
    height:70px;
}

#info{
    flex:1;
    text-align:left;
    font-size:18px;
}

#player button{
    font-size:22px;
    padding:10px 20px;
}

/* FINAL */
#final{
    gap:10px;
    font-size:22px;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio" class="tela">
<h1>Karoline, você ama o Josué? ❤️</h1>
<button id="sim" onclick="irLabirinto()">Sim</button>
<button id="nao" onmouseover="fugir()">Não</button>
</div>

<!-- LABIRINTO -->
<div id="labirintoTela" class="tela">
<h2>Guia o coração ❤️</h2>
<div id="labirinto">

<div id="playerHeart">❤️</div>
<div id="fim"></div>

<!-- paredes -->
<div class="parede" style="top:0;left:80px;width:10px;height:200px;"></div>
<div class="parede" style="top:100px;left:80px;width:150px;height:10px;"></div>
<div class="parede" style="top:50px;left:200px;width:10px;height:200px;"></div>

</div>
</div>

<!-- POESIA -->
<div id="poesia" class="tela">
<div id="texto"></div>
</div>

<!-- FINAL -->
<div id="final" class="tela">
<h2>KAROLINE ❤️</h2>
<p id="tempo"></p>
</div>

<!-- MUSICA -->
<div id="player">
<img id="capa" src="capa.jpg">
<div id="info">Lana - Kamaitachi</div>
<button onclick="toggle()">▶</button>
</div>

<audio id="musica">
<source src="lana.mp3">
</audio>

<script>
let musica = document.getElementById("musica");
let tempoInicio;

let inicio = document.getElementById("inicio");
let labirintoTela = document.getElementById("labirintoTela");
let poesia = document.getElementById("poesia");
let final = document.getElementById("final");
let texto = document.getElementById("texto");
let tempo = document.getElementById("tempo");
let nao = document.getElementById("nao");
let labirinto = document.getElementById("labirinto");
let fim = document.getElementById("fim");
let player = document.getElementById("playerHeart");

/* INICIAR */
function irLabirinto(){
inicio.style.display="none";
labirintoTela.style.display="flex";

tempoInicio = Date.now();
resetPlayer();
}

/* RESET PLAYER */
function resetPlayer(){
player.style.left="10px";
player.style.top="10px";
}

/* CONTROLE TOUCH */
document.addEventListener("touchmove", e=>{
if(labirintoTela.style.display !== "flex") return;

let t = e.touches[0];
let rect = labirinto.getBoundingClientRect();

let x = t.clientX - rect.left -15;
let y = t.clientY - rect.top -15;

/* LIMITES */
x = Math.max(0, Math.min(x, rect.width-30));
y = Math.max(0, Math.min(y, rect.height-30));

player.style.left = x+"px";
player.style.top = y+"px";

colisao();
});

/* COLISÃO */
function colisao(){
let p = player.getBoundingClientRect();

document.querySelectorAll(".parede").forEach(w=>{
let r = w.getBoundingClientRect();

if(!(p.right<r.left || p.left>r.right || p.bottom<r.top || p.top>r.bottom)){
resetPlayer();
}
});

/* CHEGAR NO FIM */
let f = fim.getBoundingClientRect();

if(!(p.right<f.left || p.left>f.right || p.bottom<f.top || p.top>f.bottom)){
terminarLabirinto();
}
}

/* TERMINAR */
function terminarLabirinto(){
labirintoTela.style.display="none";
poesia.style.display="flex";

let tempoFinal = Date.now();
let segundos = ((tempoFinal - tempoInicio)/1000).toFixed(1);
tempo.innerText = "vc terminou em "+segundos+"s";

iniciarPoesia();
}

/* POESIA */
const linhas=[
"eu nem tava pensando em vc...",
"mas vc sempre aparece...",
"e eu gosto disso ❤️"
];

function iniciarPoesia(){
texto.innerHTML="";
let i=0;

function escrever(){
if(i>=linhas.length){
setTimeout(()=>{
poesia.style.display="none";
final.style.display="flex";
},1500);
return;
}

let p=document.createElement("p");
texto.appendChild(p);

let j=0;
let inter=setInterval(()=>{
p.innerHTML+=linhas[i][j]||"";
j++;

if(j>linhas[i].length){
clearInterval(inter);
i++;
setTimeout(escrever,400);
}
},40);
}

escrever();
}

/* BOTÃO NÃO */
function fugir(){
let w = window.innerWidth - 100;
let h = window.innerHeight - 100;

nao.style.left = Math.random()*w+"px";
nao.style.top = Math.random()*h+"px";
}

/* MUSICA */
function toggle(){
musica.paused?musica.play():musica.pause();
}
</script>

</body>
</html>
