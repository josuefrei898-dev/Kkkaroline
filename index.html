<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pergunta</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    color:white;
    text-align:center;
    background: url("foto.jpg") no-repeat center/cover;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

.tela{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* botões */
button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

#sim{background:#ff4d6d;}
#nao{
    background:#222;
    position:absolute;
}

/* esconder telas */
#poesia, #final{
    display:none;
}

/* botão próximo escondido */
#btnProximo{
    margin-top:20px;
    display:none;
}

/* player */
#player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
    display:flex;
    align-items:center;
    gap:10px;
}

#capa{
    width:50px;
    height:50px;
}

#info{flex:1;text-align:left;}
input[type=range]{width:100%;}

/* corações */
.coracao{
    position:fixed;
    top:-10px;
    font-size:20px;
    animation:cair linear infinite;
}
@keyframes cair{
    to{transform:translateY(110vh);}
}

#pato{
    position:fixed;
    bottom:70px;
    right:10px;
    font-size:12px;
}
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="inicio" class="tela">
    <h1>Karoline, você ama o Josué? ❤️</h1>
    <button id="sim" onclick="irPoesia()">Sim</button>
    <button id="nao" onmouseover="fugir()">Não</button>
</div>

<!-- TELA 2 -->
<div id="poesia" class="tela">
    <div id="texto"></div>
    <button id="btnProximo" onclick="irFinal()">próximo</button>
</div>

<!-- TELA 3 -->
<div id="final" class="tela">
    <h2>KAROLINE ❤️</h2>
    <p>te amo ❤️</p>
    <p id="tempo"></p>
</div>

<!-- PLAYER -->
<div id="player">
    <img id="capa" src="capa.jpg">
    <div id="info">
        <div>Lana</div>
        <div style="font-size:12px;">Kamaitachi</div>
        <input type="range" id="barra">
    </div>
    <button onclick="toggle()">▶</button>
</div>

<audio id="musica">
    <source src="lana.mp3">
</audio>

<div id="pato">🦆 quak</div>

<script>
let musica = document.getElementById("musica");
let barra = document.getElementById("barra");
let tempoInicio = Date.now();

/* tocar música */
document.body.addEventListener("click", ()=>{
    musica.play();
}, { once:true });

/* ir poesia */
function irPoesia(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("poesia").style.display="flex";
    iniciarPoesia();
}

/* ir final */
function irFinal(){
    document.getElementById("poesia").style.display="none";
    document.getElementById("final").style.display="flex";

    let tempoFinal = Date.now();
    let segundos = ((tempoFinal - tempoInicio)/1000).toFixed(1);
    document.getElementById("tempo").innerText = "vc demorou " + segundos + "s";
}

/* poesia */
const linhas = [
"eu nem tava pensando em vc...",
"era pra eu tá estudando",
"mas vc apareceu",
"",
"vc me ajudou até nisso",
"até com html",
"",
"cada coisa que eu faço",
"tem um pouco de vc",
"",
"eu só quero te ver logo",
"",
"pq eu te amo pra krl ❤️"
];

function iniciarPoesia(){
    let i=0;
    let texto=document.getElementById("texto");

    function escrever(){
        if(i>=linhas.length){
            document.getElementById("btnProximo").style.display="block";
            return;
        }

        let p=document.createElement("p");
        texto.appendChild(p);

        let j=0;
        let linha=linhas[i];

        let inter=setInterval(()=>{
            p.innerHTML+=linha[j]||"";
            j++;

            if(j>linha.length){
                clearInterval(inter);
                i++;
                setTimeout(escrever,400);
            }
        },40);
    }

    escrever();
}

/* player */
function toggle(){
    musica.paused ? musica.play() : musica.pause();
}

musica.addEventListener("timeupdate", ()=>{
    barra.value = (musica.currentTime / musica.duration)*100;
});

barra.addEventListener("input", ()=>{
    musica.currentTime = (barra.value/100)*musica.duration;
});

/* fugir */
function fugir(){
    let x=Math.random()*(window.innerWidth-100);
    let y=Math.random()*(window.innerHeight-50);
    let b=document.getElementById("nao");
    b.style.left=x+"px";
    b.style.top=y+"px";
}

/* corações */
function criarCoracao(){
    let c=document.createElement("div");
    c.className="coracao";
    c.innerHTML="❤️";
    c.style.left=Math.random()*100+"vw";
    c.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
}
setInterval(criarCoracao,300);
</script>

</body>
</html>
