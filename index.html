<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta</title>

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
}

/* fundo */
body{
    font-family:sans-serif;
    color:white;
    text-align:center;
    background:url("foto.jpg") no-repeat center center;
    background-size:cover;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* telas */
.tela{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* esconder */
#labirintoTela, #poesia, #final{
    display:none;
}

/* LABIRINTO */
#labirinto{
    width:300px;
    height:300px;
    background:#111;
    position:relative;
    border:3px solid white;
}

.parede{
    position:absolute;
    background:white;
}

#inicioPlayer{
    position:absolute;
    width:30px;
    height:30px;
    font-size:24px;
    text-align:center;
}

#fim{
    position:absolute;
    width:30px;
    height:30px;
    background:lime;
}

/* player */
#playerHeart{
    position:absolute;
    width:30px;
    height:30px;
    font-size:22px;
}

/* poesia */
#texto{
    max-width:90%;
    font-size:22px;
}

/* botão */
button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin:10px;
}

#sim{background:#ff4d6d;}
#nao{position:absolute;background:#222;}

/* player música */
#player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
    display:flex;
    gap:10px;
    align-items:center;
}

#capa{width:60px;height:60px;}
#info{flex:1;text-align:left;}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio" class="tela">
<h1>Karoline, você ama o Josué? ❤️</h1>
<button id="sim" onclick="irLabirinto()">Sim</button>
<button id="nao" onmouseover="fugir()">Não</button>
</div>

<!-- LABIRINTO -->
<div id="labirintoTela" class="tela">
<h2>Guia o coração ❤️</h2>
<div id="labirinto">

<div id="playerHeart">❤️</div>
<div id="fim"></div>

<!-- paredes -->
<div class="parede" style="top:0;left:80px;width:10px;height:200px;"></div>
<div class="parede" style="top:100px;left:80px;width:150px;height:10px;"></div>
<div class="parede" style="top:50px;left:200px;width:10px;height:200px;"></div>

</div>
</div>

<!-- POESIA -->
<div id="poesia" class="tela">
<div id="texto"></div>
</div>

<!-- FINAL -->
<div id="final" class="tela">
<h2>KAROLINE ❤️</h2>
<p id="tempo"></p>
</div>

<!-- MUSICA -->
<div id="player">
<img id="capa" src="capa.jpg">
<div id="info">Lana - Kamaitachi</div>
<button onclick="toggle()">▶</button>
</div>

<audio id="musica">
<source src="lana.mp3">
</audio>

<script>
let musica = document.getElementById("musica");
let tempoInicio;

/* iniciar */
function irLabirinto(){
inicio.style.display="none";
labirintoTela.style.display="flex";

tempoInicio = Date.now();
resetPlayer();
}

/* player controle */
let player = document.getElementById("playerHeart");

function resetPlayer(){
player.style.left="10px";
player.style.top="10px";
}

/* controle touch */
document.addEventListener("touchmove", e=>{
let t = e.touches[0];
let rect = labirinto.getBoundingClientRect();

let x = t.clientX - rect.left -15;
let y = t.clientY - rect.top -15;

player.style.left = x+"px";
player.style.top = y+"px";

colisao();
});

/* colisão */
function colisao(){
let p = player.getBoundingClientRect();

document.querySelectorAll(".parede").forEach(w=>{
let r = w.getBoundingClientRect();

if(!(p.right<r.left || p.left>r.right || p.bottom<r.top || p.top>r.bottom)){
resetPlayer();
}
});

/* fim */
let f = fim.getBoundingClientRect();

if(!(p.right<f.left || p.left>f.right || p.bottom<f.top || p.top>f.bottom)){
terminarLabirinto();
}
}

/* terminar */
function terminarLabirinto(){
labirintoTela.style.display="none";
poesia.style.display="flex";

let tempoFinal = Date.now();
let segundos = ((tempoFinal - tempoInicio)/1000).toFixed(1);
tempo.innerText = "vc terminou em "+segundos+"s";

iniciarPoesia();
}

/* poesia */
const linhas=[
"eu nem tava pensando em vc...",
"mas vc sempre aparece...",
"e eu gosto disso ❤️"
];

function iniciarPoesia(){
let i=0;

function escrever(){
if(i>=linhas.length){
setTimeout(()=>{poesia.style.display="none";final.style.display="flex";},1500);
return;
}

let p=document.createElement("p");
texto.appendChild(p);

let j=0;
let inter=setInterval(()=>{
p.innerHTML+=linhas[i][j]||"";
j++;

if(j>linhas[i].length){
clearInterval(inter);
i++;
setTimeout(escrever,400);
}
},40);
}

escrever();
}

/* fugir */
function fugir(){
nao.style.left=Math.random()*200+"px";
nao.style.top=Math.random()*300+"px";
}

/* musica */
function toggle(){
musica.paused?musica.play():musica.pause();
}
</script>

</body>
</html>
