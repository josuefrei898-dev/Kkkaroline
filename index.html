<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pergunta</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* FUNDO CORRIGIDO E MAIS CLARO */
body{
    font-family:sans-serif;
    color:white;
    text-align:center;
    background:url("foto.jpg") no-repeat center center;
    background-size:cover;
}

/* sombra mais leve */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:rgba(0,0,0,0.4); /* antes era 0.6 */
    z-index:-1;
}

/* telas */
.tela{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    box-sizing:border-box;
}

/* início */
#inicio{
    justify-content:center;
}

/* poesia com scroll */
#poesia{
    justify-content:flex-start;
    overflow-y:auto;
}

/* final */
#final{
    justify-content:center;
}

/* botões */
button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin:10px;
}

#sim{background:#ff4d6d;}

#nao{
    background:#222;
    position:absolute;
}

/* esconder */
#poesia, #final{
    display:none;
}

/* texto poesia */
#texto{
    max-width:90%;
    font-size:22px;
    line-height:1.7;
    margin-bottom:30px;
}

/* botão próximo */
#btnProximo{
    display:none;
    font-size:20px;
    background:#ff4d6d;
    position:fixed;
    bottom:100px;
}

/* final */
#final h2{
    font-size:30px;
}

#tempo{
    font-size:22px;
    margin-top:20px;
}

/* PLAYER */
#player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:20px;
    display:flex;
    align-items:center;
    gap:20px;
}

#capa{
    width:80px;
    height:80px;
    border-radius:10px;
}

#info{
    flex:1;
    text-align:left;
    font-size:18px;
}

input[type=range]{
    width:100%;
}

#player button{
    font-size:28px;
    padding:10px;
}

/* corações */
.coracao{
    position:fixed;
    top:-10px;
    font-size:22px;
    animation:cair linear infinite;
}
@keyframes cair{
    to{transform:translateY(110vh);}
}

#pato{
    position:fixed;
    bottom:110px;
    right:10px;
    font-size:14px;
}
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="inicio" class="tela">
    <h1>Karoline, você ama o Josué? ❤️</h1>
    <button id="sim" onclick="irPoesia()">Sim</button>
    <button id="nao" onmouseover="fugir()">Não</button>
</div>

<!-- TELA 2 -->
<div id="poesia" class="tela">
    <div id="texto"></div>
    <button id="btnProximo" onclick="irFinal()">Próximo</button>
</div>

<!-- TELA 3 -->
<div id="final" class="tela">
    <h2>KAROLINE ❤️</h2>
    <p>te amo ❤️</p>
    <p id="tempo"></p>
</div>

<!-- PLAYER -->
<div id="player">
    <img id="capa" src="capa.jpg">
    <div id="info">
        <div>Lana</div>
        <div style="opacity:0.7;">Kamaitachi</div>
        <input type="range" id="barra">
    </div>
    <button onclick="toggle()">▶</button>
</div>

<audio id="musica">
    <source src="lana.mp3">
</audio>

<div id="pato">🦆 quak</div>

<script>
let musica = document.getElementById("musica");
let barra = document.getElementById("barra");
let tempoInicio = Date.now();

/* tocar música */
document.body.addEventListener("click", ()=>{
    musica.play();
}, { once:true });

/* telas */
function irPoesia(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("poesia").style.display="flex";
    iniciarPoesia();
}

function irFinal(){
    document.getElementById("poesia").style.display="none";
    document.getElementById("final").style.display="flex";

    let tempoFinal = Date.now();
    let segundos = ((tempoFinal - tempoInicio)/1000).toFixed(1);
    document.getElementById("tempo").innerText = "vc demorou " + segundos + "s";
}

/* poesia */
const linhas = [
"eu nem tava pensando em vc...",
"era pra eu tá estudando",
"mas vc apareceu",
"",
"vc me ajudou até nisso",
"até com html",
"",
"cada coisa que eu faço",
"tem um pouco de vc",
"",
"eu só quero te ver logo",
"",
"pq eu te amo pra krl ❤️"
];

function iniciarPoesia(){
    let i=0;
    let texto=document.getElementById("texto");

    function escrever(){
        if(i>=linhas.length){
            document.getElementById("btnProximo").style.display="block";
            return;
        }

        let p=document.createElement("p");
        texto.appendChild(p);

        let j=0;
        let linha=linhas[i];

        let inter=setInterval(()=>{
            p.innerHTML+=linha[j]||"";
            j++;

            if(j>linha.length){
                clearInterval(inter);
                i++;
                setTimeout(escrever,400);
            }
        },40);
    }

    escrever();
}

/* player */
function toggle(){
    musica.paused ? musica.play() : musica.pause();
}

musica.addEventListener("timeupdate", ()=>{
    barra.value = (musica.currentTime / musica.duration)*100;
});

barra.addEventListener("input", ()=>{
    musica.currentTime = (barra.value/100)*musica.duration;
});

/* botão fugir corrigido */
function fugir(){
    let b = document.getElementById("nao");

    let largura = window.innerWidth - b.offsetWidth;
    let altura = window.innerHeight - b.offsetHeight;

    let x = Math.random() * largura;
    let y = Math.random() * altura;

    b.style.left = x + "px";
    b.style.top = y + "px";
}

/* corações */
function criarCoracao(){
    let c=document.createElement("div");
    c.className="coracao";
    c.innerHTML="❤️";
    c.style.left=Math.random()*100+"vw";
    c.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
}
setInterval(criarCoracao,300);
</script>

</body>
</html>
